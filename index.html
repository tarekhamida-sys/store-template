<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تحويلك للمتجر...</title>
    
    <script src="settings.js"></script>
    
    <script>
        // التحقق من الإعداد المكتوب في ملف settings.js والتوجيه فوراً
        if (typeof activeStore !== 'undefined' && activeStore === "black") {
            window.location.replace("black.html");
        } else {
            // التوجيه للمتجر الأبيض في حال كانت القيمة white أو لم يجد الملف
            window.location.replace("white.html");
        }
    </script>
    
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Cairo', sans-serif;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2>جاري تحويلك إلى المتجر... ⏳</h2>
</body>
</html>
